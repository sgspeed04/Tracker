name: 인도 계량기 입찰 자동수집 (파일럿)

on:
  schedule:
    - cron: '0 20 * * *'   # 매일 05:00 KST (UTC 20:00 전날)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Fetch & Update 인도 계량기 입찰
        run: node scripts/fetch-india-tenders.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/india_tenders.json
          git diff --staged --quiet || git commit -m "chore: 인도 계량기 입찰 자동수집 $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push -u origin main
