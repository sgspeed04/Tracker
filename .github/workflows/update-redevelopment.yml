name: 재개발 데이터 자동 업데이트

on:
  schedule:
    - cron: '0 15 * * *'   # 매일 00:00 KST (UTC 15:00)
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch & Update Data
        env:
          SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: node scripts/fetch-redevelopment.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/redevelopment.json
          git diff --staged --quiet || git commit -m "chore: 재개발 데이터 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
