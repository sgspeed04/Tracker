<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자문 서비스 관리</title>
<style>
:root {
  --primary: #2563eb; --primary-dark: #1d4ed8; --success: #16a34a;
  --warning: #d97706; --danger: #dc2626; --purple: #7c3aed;
  --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0;
  --text: #0f172a; --muted: #64748b; --sidebar: #0f172a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:220px;background:var(--sidebar);color:#fff;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:200;transition:transform .3s}
.sidebar-logo{padding:22px 18px 18px;border-bottom:1px solid #1e293b}
.sidebar-logo h1{font-size:17px;font-weight:700;letter-spacing:-.3px}
.sidebar-logo p{font-size:11px;color:#64748b;margin-top:3px}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 18px;cursor:pointer;color:#94a3b8;font-size:13.5px;font-weight:500;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:#1e293b;color:#fff}
.nav-item.active{background:#1e293b;color:#fff;border-left-color:var(--primary)}
.nav-icon{font-size:16px;width:18px;text-align:center}
.sidebar-footer{padding:14px 18px;border-top:1px solid #1e293b}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#64748b;margin-right:6px}
.sync-dot.ok{background:#22c55e} .sync-dot.err{background:#ef4444} .sync-dot.ing{background:#f59e0b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-label{font-size:11px;color:#64748b}

/* MAIN */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h2{font-size:19px;font-weight:700}
.topbar-right{display:flex;gap:10px;align-items:center}
.hamburger{display:none;background:none;border:none;cursor:pointer;font-size:20px;padding:4px}
.content{padding:28px;flex:1}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px}
.stat-label{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500}
.stat-value{font-size:26px;font-weight:800}
.stat-sub{font-size:12px;color:var(--muted);margin-top:4px}
.stat.c1 .stat-value{color:var(--primary)} .stat.c2 .stat-value{color:var(--success)}
.stat.c3 .stat-value{color:var(--warning)} .stat.c4 .stat-value{color:var(--purple)}

/* CARDS */
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:18px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.card-title{font-size:15px;font-weight:700}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}

/* BUTTONS */
.btn{padding:8px 15px;border-radius:8px;border:none;cursor:pointer;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .15s;text-decoration:none}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border)}.btn-outline:hover{background:var(--bg)}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-warning{background:var(--warning);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-ghost{background:none;border:none;cursor:pointer;color:var(--muted);padding:4px 8px;border-radius:6px;font-size:13px;transition:all .15s}.btn-ghost:hover{background:var(--bg);color:var(--text)}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;padding:10px 14px;font-size:11.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:13px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
.actions-cell{display:flex;gap:4px;align-items:center}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:11.5px;font-weight:600;white-space:nowrap}
.badge-blue{background:#dbeafe;color:#1d4ed8} .badge-green{background:#dcfce7;color:#15803d}
.badge-yellow{background:#fef3c7;color:#92400e} .badge-purple{background:#ede9fe;color:#6d28d9}
.badge-red{background:#fee2e2;color:#b91c1c} .badge-gray{background:#f1f5f9;color:#475569}
.badge-orange{background:#fff7ed;color:#c2410c}

/* SEARCH & FILTER */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.search-wrap{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 12px}
.search-wrap input{border:none;outline:none;font-size:13.5px;width:180px;background:transparent}
select.filter-select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13.5px;background:#fff;cursor:pointer;outline:none}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;width:560px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-hd{padding:22px 22px 0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;border-bottom:1px solid var(--border);padding-bottom:14px}
.modal-hd h3{font-size:17px;font-weight:700}
.modal-body{padding:20px 22px}
.modal-ft{padding:0 22px 20px;display:flex;gap:10px;justify-content:flex-end}
.close-btn{background:none;border:none;cursor:pointer;font-size:22px;color:var(--muted);padding:2px 6px}

/* FORMS */
.form-group{margin-bottom:15px}
.form-label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
.form-control{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13.5px;outline:none;transition:border-color .15s;background:#fff}
.form-control:focus{border-color:var(--primary)}
textarea.form-control{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-hint{font-size:11.5px;color:var(--muted);margin-top:4px}
.required{color:var(--danger)}

/* ACTIVITY */
.activity-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.a-icon{width:32px;height:32px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.a-content{flex:1}
.a-title{font-size:13.5px;font-weight:500}
.a-time{font-size:12px;color:var(--muted);margin-top:2px}

/* SESSION CARD */
.session-item{display:flex;gap:14px;padding:12px;background:var(--bg);border-radius:10px;margin-bottom:10px}
.session-date{background:var(--primary);color:#fff;border-radius:8px;padding:8px 10px;text-align:center;min-width:48px}
.s-day{font-size:20px;font-weight:800;line-height:1}
.s-mon{font-size:10px;text-transform:uppercase;opacity:.85}
.s-info{flex:1}
.s-client{font-weight:700;font-size:14px}
.s-topic{font-size:12.5px;color:var(--muted);margin-top:1px}
.s-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}

/* INCOME CHART */
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.bar-lbl{width:100px;font-size:13px;color:var(--muted);text-align:right}
.bar-track{flex:1;background:var(--bg);border-radius:4px;height:9px}
.bar-fill{height:100%;border-radius:4px;background:var(--primary);min-width:4px;transition:width .5s}
.bar-val{width:100px;font-size:13px;font-weight:700}

/* SETTINGS */
.settings-section{margin-bottom:28px}
.settings-title{font-size:14px;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.code-block{background:#1e293b;color:#e2e8f0;padding:14px;border-radius:8px;font-size:12px;font-family:monospace;overflow-x:auto;white-space:pre;margin-top:10px}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 16px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty p{font-size:14px}

/* TABS */
.tab-bar{display:flex;gap:4px;background:var(--bg);border-radius:9px;padding:4px;margin-bottom:20px;border:1px solid var(--border)}
.tab-btn{flex:1;padding:7px 12px;border:none;background:transparent;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all .15s}
.tab-btn.active{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* GMAIL BUTTON */
.gmail-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer;background:#fff;text-decoration:none;color:var(--text);transition:all .15s}
.gmail-btn:hover{background:#f1f5f9}
.gmail-icon{color:#ea4335}

/* MOBILE */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199}
.sidebar-overlay.show{display:block}
@media(max-width:900px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .grid2{grid-template-columns:1fr}
}
@media(max-width:640px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .hamburger{display:block}
  .content{padding:16px}
  .stats-grid{grid-template-columns:1fr 1fr;gap:10px}
  .form-row{grid-template-columns:1fr}
  .topbar{padding:12px 16px}
  .modal{width:98vw}
  .search-wrap input{width:130px}
}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR OVERLAY (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <h1>⚡ 자문 관리</h1>
    <p id="userName">컨설팅 서비스</p>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-item active" onclick="navigate('dashboard')" data-view="dashboard">
      <span class="nav-icon">📊</span> 대시보드
    </div>
    <div class="nav-item" onclick="navigate('clients')" data-view="clients">
      <span class="nav-icon">👥</span> 클라이언트
    </div>
    <div class="nav-item" onclick="navigate('sessions')" data-view="sessions">
      <span class="nav-icon">🎙️</span> 자문 기록
    </div>
    <div class="nav-item" onclick="navigate('income')" data-view="income">
      <span class="nav-icon">💰</span> 수입 관리
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="nav-item" onclick="navigate('settings')" data-view="settings" style="padding:8px 0;border:none">
      <span class="nav-icon">⚙️</span> <span style="font-size:12px;color:#64748b">설정 / 연동</span>
    </div>
    <div style="display:flex;align-items:center;margin-top:6px">
      <span class="sync-dot" id="syncDot"></span>
      <span class="sync-label" id="syncLabel">로컬 저장</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="hamburger" onclick="openSidebar()">☰</button>
      <h2 id="pageTitle">대시보드</h2>
    </div>
    <div class="topbar-right" id="topbarActions"></div>
  </div>
  <div class="content" id="content"></div>
</div>
</div>

<!-- MODALS -->
<div class="overlay" id="clientModal">
  <div class="modal">
    <div class="modal-hd">
      <h3 id="clientModalTitle">클라이언트 추가</h3>
      <button class="close-btn" onclick="closeModal('clientModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="clientId">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">이름 <span class="required">*</span></label>
          <input class="form-control" id="clientName" placeholder="홍길동">
        </div>
        <div class="form-group">
          <label class="form-label">회사</label>
          <input class="form-control" id="clientCompany" placeholder="(주)예시기업">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input class="form-control" id="clientEmail" type="email" placeholder="email@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">전화번호</label>
          <input class="form-control" id="clientPhone" placeholder="010-0000-0000">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">업종</label>
          <select class="form-control" id="clientIndustry">
            <option value="">선택</option>
            <option>유통/이커머스</option><option>제조</option><option>IT/테크</option>
            <option>금융</option><option>무역/수출</option><option>물류</option>
            <option>글로벌 컨설팅</option><option>기타</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">플랫폼</label>
          <select class="form-control" id="clientPlatform">
            <option value="">선택</option>
            <option>GLG</option><option>Coupang</option><option>LinkedIn</option>
            <option>직접</option><option>지인 소개</option><option>기타</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">기본 시간당 단가 (원)</label>
        <input class="form-control" id="clientRate" type="number" placeholder="300000">
      </div>
      <div class="form-group">
        <label class="form-label">메모</label>
        <textarea class="form-control" id="clientNotes" placeholder="자문 분야, 특이사항 등"></textarea>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-outline" onclick="closeModal('clientModal')">취소</button>
      <button class="btn btn-primary" onclick="saveClient()">저장</button>
    </div>
  </div>
</div>

<div class="overlay" id="sessionModal">
  <div class="modal">
    <div class="modal-hd">
      <h3 id="sessionModalTitle">자문 기록 추가</h3>
      <button class="close-btn" onclick="closeModal('sessionModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="sessionId">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">날짜 <span class="required">*</span></label>
          <input class="form-control" id="sessionDate" type="date">
        </div>
        <div class="form-group">
          <label class="form-label">클라이언트 <span class="required">*</span></label>
          <select class="form-control" id="sessionClientId">
            <option value="">선택하세요</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">자문 주제</label>
        <input class="form-control" id="sessionTopic" placeholder="예: 해외 이커머스 진출 전략">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">소요 시간 (시간)</label>
          <input class="form-control" id="sessionHours" type="number" step="0.5" min="0.5" placeholder="1">
        </div>
        <div class="form-group">
          <label class="form-label">플랫폼</label>
          <select class="form-control" id="sessionPlatform">
            <option value="">선택</option>
            <option>GLG</option><option>Coupang</option><option>LinkedIn</option>
            <option>직접</option><option>지인 소개</option><option>기타</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">단가 (원/시간)</label>
          <input class="form-control" id="sessionRate" type="number" placeholder="300000">
        </div>
        <div class="form-group">
          <label class="form-label">총 금액 (원)</label>
          <input class="form-control" id="sessionFee" type="number" placeholder="자동계산">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">상태</label>
        <select class="form-control" id="sessionStatus">
          <option value="scheduled">예정</option>
          <option value="completed">완료</option>
          <option value="invoiced">청구됨</option>
          <option value="paid">수금완료</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">메모</label>
        <textarea class="form-control" id="sessionNotes" placeholder="자문 내용, 후속 조치 등"></textarea>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-outline" onclick="closeModal('sessionModal')">취소</button>
      <button class="btn btn-primary" onclick="saveSession()">저장</button>
    </div>
  </div>
</div>

<div class="overlay" id="confirmModal">
  <div class="modal" style="width:360px">
    <div class="modal-hd"><h3>삭제 확인</h3><button class="close-btn" onclick="closeModal('confirmModal')">✕</button></div>
    <div class="modal-body"><p id="confirmMsg" style="font-size:14px;line-height:1.6"></p></div>
    <div class="modal-ft">
      <button class="btn btn-outline" onclick="closeModal('confirmModal')">취소</button>
      <button class="btn btn-danger" id="confirmBtn">삭제</button>
    </div>
  </div>
</div>

<div class="overlay" id="emailModal">
  <div class="modal">
    <div class="modal-hd"><h3>이메일 템플릿</h3><button class="close-btn" onclick="closeModal('emailModal')">✕</button></div>
    <div class="modal-body" id="emailModalBody"></div>
    <div class="modal-ft">
      <button class="btn btn-outline" onclick="closeModal('emailModal')">닫기</button>
      <button class="btn btn-primary" onclick="copyEmailTemplate()">📋 복사</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
'use strict';

// ─── STATE ───────────────────────────────────────────────────
const D_KEY = 'cm_data', S_KEY = 'cm_settings';
let clients = [], sessions = [];
let cfg = {
  userName: '한상규', supabaseUrl: '', supabaseKey: '',
  defaultRate: 300000, defaultHours: 1, gmailUser: ''
};
let sb = null, syncStatus = 'local', currentView = 'dashboard';

// ─── STORAGE ─────────────────────────────────────────────────
function load() {
  try {
    const d = JSON.parse(localStorage.getItem(D_KEY) || '{}');
    clients = d.clients || []; sessions = d.sessions || [];
    const s = JSON.parse(localStorage.getItem(S_KEY) || '{}');
    cfg = {...cfg, ...s};
  } catch(e) {}
}
function save() {
  localStorage.setItem(D_KEY, JSON.stringify({clients, sessions}));
  localStorage.setItem(S_KEY, JSON.stringify(cfg));
  if (sb) syncSupabase();
}

// ─── SUPABASE ────────────────────────────────────────────────
async function initSupabase() {
  if (!cfg.supabaseUrl || !cfg.supabaseKey) return;
  try {
    sb = supabase.createClient(cfg.supabaseUrl, cfg.supabaseKey);
    await pullFromSupabase();
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('err'); }
}
async function pullFromSupabase() {
  if (!sb) return;
  try {
    setSyncStatus('ing');
    const [cr, sr] = await Promise.all([
      sb.from('cm_clients').select('*').order('created_at'),
      sb.from('cm_sessions').select('*').order('date', {ascending:false})
    ]);
    if (!cr.error) clients = cr.data;
    if (!sr.error) sessions = sr.data;
    localStorage.setItem(D_KEY, JSON.stringify({clients, sessions}));
    setSyncStatus('ok');
    render();
  } catch(e) { setSyncStatus('err'); }
}
async function syncSupabase() {
  if (!sb) return;
  setSyncStatus('ing');
  try {
    await Promise.all([
      sb.from('cm_clients').upsert(clients),
      sb.from('cm_sessions').upsert(sessions)
    ]);
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('err'); }
}
function setSyncStatus(s) {
  syncStatus = s;
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  if (!dot) return;
  dot.className = 'sync-dot' + (s==='ok'?' ok':s==='err'?' err':s==='ing'?' ing':'');
  lbl.textContent = s==='ok'?'Supabase 동기화':s==='err'?'동기화 오류':s==='ing'?'동기화 중...':'로컬 저장';
}

// ─── UTILS ───────────────────────────────────────────────────
const uid = () => crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)+Math.random().toString(36).slice(2);
const fmt = n => n?.toLocaleString('ko-KR') || '0';
const fmtW = n => n ? '₩'+fmt(n) : '-';
const fmtDate = d => d ? new Date(d+'T00:00').toLocaleDateString('ko-KR',{month:'short',day:'numeric'}) : '';
const fmtDateFull = d => d ? new Date(d+'T00:00').toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'}) : '';
const today = () => new Date().toISOString().slice(0,10);
const thisMonth = () => new Date().toISOString().slice(0,7);

function statusBadge(s) {
  const map = {scheduled:['badge-blue','예정'],completed:['badge-green','완료'],invoiced:['badge-yellow','청구됨'],paid:['badge-purple','수금완료']};
  const [cls,lbl] = map[s]||['badge-gray',s];
  return `<span class="badge ${cls}">${lbl}</span>`;
}
function platformBadge(p) {
  return p ? `<span class="badge badge-orange" style="font-size:11px">${p}</span>` : '';
}
function clientName(id) {
  const c = clients.find(c=>c.id===id);
  return c ? (c.name + (c.company?` <span style="color:var(--muted);font-size:12px">${c.company}</span>`:'')) : '(삭제됨)';
}
function clientById(id) { return clients.find(c=>c.id===id); }

// ─── NAVIGATION ──────────────────────────────────────────────
function navigate(view) {
  currentView = view;
  document.querySelectorAll('.nav-item[data-view]').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });
  const titles = {dashboard:'대시보드',clients:'클라이언트',sessions:'자문 기록',income:'수입 관리',settings:'설정 / 연동'};
  document.getElementById('pageTitle').textContent = titles[view]||view;
  closeSidebar();
  render();
}
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

// ─── INCOME ──────────────────────────────────────────────────
function renderIncome() {
  document.getElementById('topbarActions').innerHTML = `<button class="btn btn-outline" onclick="copyIncomeReport()">📋 보고서 복사</button>`;

  const paid = sessions.filter(s=>s.status==='paid');
  const totalPaid = paid.reduce((a,s)=>a+(s.fee||0),0);
  const totalInvoiced = sessions.filter(s=>s.status==='invoiced').reduce((a,s)=>a+(s.fee||0),0);
  const totalPending = sessions.filter(s=>s.status==='completed').reduce((a,s)=>a+(s.fee||0),0);

  // Monthly breakdown
  const monthMap = {};
  sessions.forEach(s=>{
    if (!s.date) return;
    const m = s.date.slice(0,7);
    if (!monthMap[m]) monthMap[m] = {total:0, paid:0, count:0, paidCount:0};
    monthMap[m].count++;
    if (s.status==='paid') { monthMap[m].paid+=(s.fee||0); monthMap[m].paidCount++; }
    monthMap[m].total+=(s.fee||0);
  });
  const months = Object.keys(monthMap).sort((a,b)=>b.localeCompare(a)).slice(0,12);
  const maxPaid = Math.max(...months.map(m=>monthMap[m].paid), 1);

  // Platform breakdown
  const platMap = {};
  paid.forEach(s=>{
    const p = s.platform||'기타';
    platMap[p] = (platMap[p]||0) + (s.fee||0);
  });
  const maxPlat = Math.max(...Object.values(platMap), 1);

  document.getElementById('content').innerHTML = `
  <div class="stats-grid">
    <div class="stat c2"><div class="stat-label">수금 완료</div><div class="stat-value">${totalPaid>=10000?Math.round(totalPaid/10000)+'만':'₩0'}</div><div class="stat-sub">₩${fmt(totalPaid)}</div></div>
    <div class="stat c3"><div class="stat-label">청구됨 (미수금)</div><div class="stat-value">${totalInvoiced>=10000?Math.round(totalInvoiced/10000)+'만':'₩'+fmt(totalInvoiced)}</div><div class="stat-sub">청구 발송 완료</div></div>
    <div class="stat c1"><div class="stat-label">완료 (미청구)</div><div class="stat-value">${totalPending>=10000?Math.round(totalPending/10000)+'만':'₩'+fmt(totalPending)}</div><div class="stat-sub">청구 필요</div></div>
    <div class="stat c4"><div class="stat-label">전체 자문</div><div class="stat-value">${sessions.length}</div><div class="stat-sub">누적</div></div>
  </div>
  <div class="grid2">
    <div class="card">
      <div class="card-header"><span class="card-title">📅 월별 수입</span></div>
      ${months.length ? months.map(m=>{
        const d = monthMap[m];
        const pct = Math.round(d.paid/maxPaid*100)||2;
        return `<div class="bar-row">
          <div class="bar-lbl">${m.slice(5)}월</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
          <div class="bar-val">₩${d.paid>=10000?Math.round(d.paid/10000)+'만':fmt(d.paid)}</div>
        </div>`;
      }).join('') : '<div class="empty"><p>수입 데이터가 없습니다</p></div>'}
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">🔗 플랫폼별 수입</span></div>
      ${Object.keys(platMap).length ? Object.entries(platMap).sort((a,b)=>b[1]-a[1]).map(([p,v])=>{
        const pct = Math.round(v/maxPlat*100)||2;
        return `<div class="bar-row">
          <div class="bar-lbl">${p}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:#7c3aed"></div></div>
          <div class="bar-val">₩${v>=10000?Math.round(v/10000)+'만':fmt(v)}</div>
        </div>`;
      }).join('') : '<div class="empty"><p>데이터가 없습니다</p></div>'}
    </div>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">📋 월별 상세</span></div>
    <div class="tbl-wrap"><table>
      <tr><th>월</th><th>자문 수</th><th>수금액</th><th>수금 건수</th><th>미수금</th></tr>
      ${months.map(m=>{
        const d = monthMap[m];
        const unpaid = d.total - d.paid;
        return `<tr>
          <td style="font-weight:600">${m}</td>
          <td>${d.count}건</td>
          <td style="font-weight:700;color:var(--success)">₩${fmt(d.paid)}</td>
          <td>${d.paidCount}건</td>
          <td style="color:${unpaid>0?'var(--warning)':'var(--muted)'}">₩${fmt(unpaid)}</td>
        </tr>`;
      }).join('')}
    </table></div>
  </div>`;
}

function copyIncomeReport() {
  const lines = ['자문 수입 보고서', '='.repeat(30)];
  const paid = sessions.filter(s=>s.status==='paid');
  const total = paid.reduce((a,s)=>a+(s.fee||0),0);
  lines.push(`총 수금: ₩${fmt(total)}`);
  lines.push(`총 자문 건수: ${sessions.length}건`);
  lines.push('');
  const monthMap = {};
  sessions.forEach(s=>{if(!s.date)return;const m=s.date.slice(0,7);if(!monthMap[m])monthMap[m]={paid:0,count:0};if(s.status==='paid'){monthMap[m].paid+=(s.fee||0);monthMap[m].count++}});
  Object.keys(monthMap).sort((a,b)=>b.localeCompare(a)).forEach(m=>{lines.push(`${m}: ₩${fmt(monthMap[m].paid)} (${monthMap[m].count}건)`)});
  navigator.clipboard.writeText(lines.join('\n')).then(()=>alert('보고서가 클립보드에 복사됐습니다!'));
}

        <div class="settings-title">☁️ Supabase 연동 (크로스 디바이스 동기화)</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:14px">설정하면 핸드폰/패드/PC 모두 동기화됩니다</div>
        <div class="form-group"><label class="form-label">Supabase URL</label><input class="form-control" id="cfgSbUrl" value="${cfg.supabaseUrl}" placeholder="https://xxx.supabase.co"></div>
        <div class="form-group"><label class="form-label">Supabase Anon Key</label><input class="form-control" id="cfgSbKey" value="${cfg.supabaseKey}" placeholder="eyJ..." type="password"></div>
        <div style="display:flex;gap:10px;align-items:center">
          <button class="btn btn-primary" onclick="saveSupabaseSettings()">연동 저장</button>
          <span class="sync-label" id="settingsSyncLabel">${syncStatus==='ok'?'✅ 연결됨':syncStatus==='err'?'❌ 오류':'로컬 모드'}</span>
        </div>
        <div style="margin-top:16px">
          <div style="font-size:12px;font-weight:600;margin-bottom:6px;color:var(--muted)">Supabase에서 실행할 SQL (테이블 생성):</div>
          <div class="code-block">create table cm_clients (
  id uuid default gen_random_uuid() primary key,
  name text not null,
  company text, email text, phone text,
  industry text, platform text,
  rate int, notes text,
  created_at timestamptz default now()
);
create table cm_sessions (
  id uuid default gen_random_uuid() primary key,
  client_id uuid references cm_clients(id),
  date date, topic text,
  hours numeric default 1,
  platform text, rate int, fee int,
  status text default 'scheduled',
  notes text,
  created_at timestamptz default now()
);</div>
          <button class="btn btn-outline btn-sm" style="margin-top:8px" onclick="copySQL()">📋 SQL 복사</button>
        </div>
      </div>
      <div class="card settings-section">
        <div class="settings-title">📲 모바일 설치 (홈 화면 추가)</div>
        <div style="font-size:13.5px;line-height:1.8;color:var(--text)">
          <b>iPhone/iPad:</b> Safari → 공유 버튼 → 홈 화면에 추가<br>
          <b>Android:</b> Chrome 메뉴 → 홈 화면에 추가<br>
          <b>PC:</b> 즐겨찾기에 저장 또는 북마크 바 등록
          <div style="margin-top:10px;padding:10px;background:#dcfce7;border-radius:8px;font-size:12.5px">
            💡 Supabase 연동 시 모든 기기에서 실시간 동기화됩니다
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function saveSettings() {
  cfg.userName = document.getElementById('cfgName').value;
  cfg.defaultRate = parseInt(document.getElementById('cfgRate').value)||300000;
  cfg.defaultHours = parseFloat(document.getElementById('cfgHours').value)||1;
  cfg.gmailUser = document.getElementById('cfgGmail').value;
  save(); render(); alert('저장됐습니다!');
}
async function saveSupabaseSettings() {
  cfg.supabaseUrl = document.getElementById('cfgSbUrl').value.trim();
  cfg.supabaseKey = document.getElementById('cfgSbKey').value.trim();
  save();
  if (cfg.supabaseUrl && cfg.supabaseKey) {
    await initSupabase();
    const lbl = document.getElementById('settingsSyncLabel');
    if (lbl) lbl.textContent = syncStatus==='ok'?'✅ 연결됨':syncStatus==='err'?'❌ URL/Key 확인 필요':'로컬 모드';
  }
}
function copySQL() {
  const sql = `create table cm_clients (id uuid default gen_random_uuid() primary key, name text not null, company text, email text, phone text, industry text, platform text, rate int, notes text, created_at timestamptz default now());\ncreate table cm_sessions (id uuid default gen_random_uuid() primary key, client_id uuid references cm_clients(id), date date, topic text, hours numeric default 1, platform text, rate int, fee int, status text default 'scheduled', notes text, created_at timestamptz default now());`;
  navigator.clipboard.writeText(sql).then(()=>alert('SQL이 복사됐습니다!'));
}

// ─── CLIENT CRUD ─────────────────────────────────────────────
function openClientModal(id) {
  const c = id ? clients.find(c=>c.id===id) : null;
  document.getElementById('clientModalTitle').textContent = c ? '클라이언트 수정' : '클라이언트 추가';
  document.getElementById('clientId').value = c?.id||'';
  document.getElementById('clientName').value = c?.name||'';
  document.getElementById('clientCompany').value = c?.company||'';
  document.getElementById('clientEmail').value = c?.email||'';
  document.getElementById('clientPhone').value = c?.phone||'';
  document.getElementById('clientIndustry').value = c?.industry||'';
  document.getElementById('clientPlatform').value = c?.platform||'';
  document.getElementById('clientRate').value = c?.rate||cfg.defaultRate;
  document.getElementById('clientNotes').value = c?.notes||'';
  openModal('clientModal');
}
function saveClient() {
  const name = document.getElementById('clientName').value.trim();
  if (!name) { alert('이름을 입력해주세요'); return; }
  const id = document.getElementById('clientId').value || uid();
  const existing = clients.find(c=>c.id===id);
  const data = {
    id, name, company:$v('clientCompany'), email:$v('clientEmail'),
    phone:$v('clientPhone'), industry:$v('clientIndustry'), platform:$v('clientPlatform'),
    rate:parseInt($v('clientRate'))||cfg.defaultRate, notes:$v('clientNotes'),
    created_at: existing?.created_at || new Date().toISOString()
  };
  if (existing) Object.assign(existing, data);
  else clients.push(data);
  save(); closeModal('clientModal'); render();
}
function deleteClient(id) {
  clients = clients.filter(c=>c.id!==id);
  sessions = sessions.filter(s=>s.client_id!==id);
  save(); render();
}

// ─── SESSION CRUD ─────────────────────────────────────────────
function openSessionModal(id) {
  const s = id ? sessions.find(s=>s.id===id) : null;
  document.getElementById('sessionModalTitle').textContent = s ? '자문 수정' : '자문 기록 추가';
  document.getElementById('sessionId').value = s?.id||'';
  document.getElementById('sessionDate').value = s?.date||today();
  document.getElementById('sessionTopic').value = s?.topic||'';
  document.getElementById('sessionHours').value = s?.hours||cfg.defaultHours;
  document.getElementById('sessionPlatform').value = s?.platform||'';
  document.getElementById('sessionRate').value = s?.rate||cfg.defaultRate;
  document.getElementById('sessionFee').value = s?.fee||((s?.hours||cfg.defaultHours)*(s?.rate||cfg.defaultRate));
  document.getElementById('sessionStatus').value = s?.status||'scheduled';
  document.getElementById('sessionNotes').value = s?.notes||'';

  // populate client select
  const sel = document.getElementById('sessionClientId');
  sel.innerHTML = '<option value="">선택하세요</option>' + clients.map(c=>`<option value="${c.id}" ${s?.client_id===c.id?'selected':''}>${c.name}${c.company?' ('+c.company+')':''}</option>`).join('');

  // auto-fill rate from client on change
  sel.onchange = () => {
    const c = clients.find(c=>c.id===sel.value);
    if (c?.rate) { document.getElementById('sessionRate').value=c.rate; recalcFee(); }
  };

  openModal('sessionModal');
  // wire up auto-calc
  ['sessionHours','sessionRate'].forEach(id2=>{
    document.getElementById(id2).oninput = recalcFee;
  });
}
function recalcFee() {
  const h = parseFloat(document.getElementById('sessionHours').value)||0;
  const r = parseInt(document.getElementById('sessionRate').value)||0;
  document.getElementById('sessionFee').value = h*r;
}
function saveSession() {
  const clientId = document.getElementById('sessionClientId').value;
  const date = document.getElementById('sessionDate').value;
  if (!clientId) { alert('클라이언트를 선택해주세요'); return; }
  if (!date) { alert('날짜를 입력해주세요'); return; }
  const id = document.getElementById('sessionId').value || uid();
  const existing = sessions.find(s=>s.id===id);
  const data = {
    id, client_id:clientId, date, topic:$v('sessionTopic'),
    hours:parseFloat($v('sessionHours'))||1,
    platform:$v('sessionPlatform'),
    rate:parseInt($v('sessionRate'))||cfg.defaultRate,
    fee:parseInt($v('sessionFee'))||0,
    status:$v('sessionStatus')||'scheduled',
    notes:$v('sessionNotes'),
    created_at: existing?.created_at||new Date().toISOString()
  };
  if (existing) Object.assign(existing, data);
  else sessions.push(data);
  save(); closeModal('sessionModal'); render();
}
function deleteSession(id) { sessions=sessions.filter(s=>s.id!==id); save(); render(); }

// ─── EMAIL TEMPLATE ──────────────────────────────────────────
function openEmailModal(client) {
  const subject = `자문 일정 확인 - ${client.name}님`;
  const body = `안녕하세요 ${client.name}님,\n\n저는 ${cfg.userName}입니다.\n\n자문 일정 관련하여 연락드립니다.\n\n가능하신 날짜와 시간을 알려주시면 일정을 잡겠습니다.\n\n감사합니다.\n${cfg.userName}`;

  const mailtoLink = `mailto:${client.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  const gmailLink = `https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(client.email)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

  document.getElementById('emailModalBody').innerHTML = `
    <div class="form-group"><label class="form-label">받는 사람</label><input class="form-control" value="${client.email}" readonly></div>
    <div class="form-group"><label class="form-label">제목</label><input class="form-control" id="emailSubject" value="${subject}"></div>
    <div class="form-group"><label class="form-label">본문</label><textarea class="form-control" id="emailBody" rows="7">${body}</textarea></div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <a class="btn btn-primary" href="${gmailLink}" target="_blank">📧 Gmail로 보내기</a>
      <a class="btn btn-outline" href="${mailtoLink}">✉️ 메일 앱으로</a>
    </div>`;
  openModal('emailModal');
}
function copyEmailTemplate() {
  const subj = document.getElementById('emailSubject')?.value||'';
  const body = document.getElementById('emailBody')?.value||'';
  navigator.clipboard.writeText(`제목: ${subj}\n\n${body}`).then(()=>alert('이메일이 복사됐습니다!'));
}

// ─── CONFIRM DELETE ──────────────────────────────────────────
function confirmDelete(type, id, name) {
  document.getElementById('confirmMsg').textContent = `"${name}"을(를) 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`;
  document.getElementById('confirmBtn').onclick = () => {
    if (type==='client') deleteClient(id);
    else deleteSession(id);
    closeModal('confirmModal');
  };
  openModal('confirmModal');
}

// ─── MODAL HELPERS ───────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if(e.target===el) el.classList.remove('show'); });
});
const $v = id => document.getElementById(id)?.value || '';

// ─── INIT ────────────────────────────────────────────────────
load();
initSupabase().then(render);

// ESC to close modals
document.addEventListener('keydown', e => {
  if (e.key==='Escape') document.querySelectorAll('.overlay.show').forEach(el=>el.classList.remove('show'));
});
</script>
</body>
</html>
